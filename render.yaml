services:
  - type: web
    name: ablute-wellness-backend
    runtime: node
    repo: https://github.com/ablutecompany/app_wellnessVariation2.0
    branch: main
    rootDir: backend
    plan: free
    region: frankfurt
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run db:sync && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
