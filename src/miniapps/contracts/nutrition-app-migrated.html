<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner v2 - Migrated</title>
    <style>
        body { background: #05070A; color: #fff; font-family: sans-serif; padding: 20px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .allowed { background: #00D4AA20; color: #00D4AA; border: 1px solid #00D4AA40; }
        .denied { background: #FF606020; color: #FF6060; border: 1px solid #FF606040; }
        .unavailable { background: #FFA50020; color: #FFA500; border: 1px solid #FFA50040; }
        .panel { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; margin-top: 16px; }
        h1 { font-size: 18px; margin-bottom: 8px; color: #00D4AA; }
    </style>
</head>
<body>
    <h1>🥗 _Meal planner v1.2</h1>
    <div id="status-container"></div>
    <div id="nutrition-panel" class="panel">A carregar plano nutricional...</div>

    <script>
        // SDK Simulation Layer - V1.3.0
        window.AbluteSDK = {
           resolvePackageState: (ctx, domain) => {
               if (!ctx || !ctx.domainPackages) return { status: 'missing', pkg: null };
               const pkg = ctx.domainPackages.find(p => p.domain === domain);
               if (!pkg) return { status: 'missing', pkg: null };
               return { status: pkg.exposurePolicy, pkg };
           },
           getPackageSignals: (ctx, domain) => {
               const state = window.AbluteSDK.resolvePackageState(ctx, domain);
               return state.status === 'allowed' ? state.pkg.signals : null;
           },
           getPackageFacts: (ctx, domain) => {
               const state = window.AbluteSDK.resolvePackageState(ctx, domain);
               return state.status === 'allowed' ? state.pkg.facts : [];
           }
        };

        window.addEventListener('ablute:ready', (e) => {
            console.log('[NutriApp] Shell ready. Abstracting domainPackages via SDK...');
            runNutritionFlow();
        });

        function runNutritionFlow() {
            const context = window.ablute;
            const sdk = window.AbluteSDK;
            const statusEl = document.getElementById('status-container');
            const panelEl = document.getElementById('nutrition-panel');

            // 1. Resolução polimórfica (Substitui find manual iterativo e previne ifs complexos)
            const { status, pkg } = sdk.resolvePackageState(context, 'nutrition');

            if (status === 'missing') {
                statusEl.innerHTML = '<span class="status-badge denied">ERRO: SEM ACESSO</span>';
                panelEl.innerHTML = 'Este domínio não existe na bridge local.';
                return;
            }

            if (status === 'allowed') {
                // Leitura isolada dos sub-conteúdos p/ prevenir null pointers no objeto
                const signals = sdk.getPackageSignals(context, 'nutrition');
                const facts = sdk.getPackageFacts(context, 'nutrition');

                // Telemetria c/ política resolvida
                window.ablute.emit('package_read', { 
                  domain: 'nutrition', 
                  version: pkg.packageVersion,
                  policy: 'allowed'
                });

                statusEl.innerHTML = '<span class="status-badge allowed">PLANO ATIVO (v1.3)</span>';
                const score = signals?.score || '--';
                const label = signals?.statusLabel || 'Estável';
                
                panelEl.innerHTML = `
                    <div style="font-size: 24px; color: #00D4AA; font-weight: bold;">${score}%</div>
                    <div>Meta Metabólica: ${label}</div>
                    <div style="margin-top: 12px; font-size: 12px; color: #aaa;">
                        Factos nutricionais ativos: ${facts.length}
                    </div>
                `;
            } else if (status === 'denied') {
                statusEl.innerHTML = '<span class="status-badge denied">RESTRICTED</span>';
                panelEl.innerHTML = 'Ative as permissões de nutrição no perfil.';
            } else if (status === 'unavailable') {
                statusEl.innerHTML = '<span class="status-badge unavailable">SEM HISTÓRICO</span>';
                panelEl.innerHTML = 'Nenhum registo de refeições disponível para gerar plano.';
            }

            // Fallback legacy abandonado
        }
    </script>
</body>
</html>
