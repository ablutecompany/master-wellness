<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Sleep v2 - Migrated</title>
    <style>
        body { background: #05070A; color: #fff; font-family: sans-serif; padding: 20px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .allowed { background: #00F2FF20; color: #00F2FF; border: 1px solid #00F2FF40; }
        .denied { background: #FF606020; color: #FF6060; border: 1px solid #FF606040; }
        .unavailable { background: #FFA50020; color: #FFA500; border: 1px solid #FFA50040; }
        .panel { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; margin-top: 16px; }
        h1 { font-size: 18px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>🌙 Deep Sleep v2</h1>
    <div id="status-container"></div>
    <div id="data-panel" class="panel">A carregar contexto...</div>

    <script>
        // SDK Simulation Layer - V1.3.0
        // (Em produção, o Ablute bridge injeta isto nativamente no object window)
        window.AbluteSDK = {
           resolvePackageState: (ctx, domain) => {
               if (!ctx || !ctx.domainPackages) return { status: 'missing', pkg: null };
               const pkg = ctx.domainPackages.find(p => p.domain === domain);
               if (!pkg) return { status: 'missing', pkg: null };
               return { status: pkg.exposurePolicy, pkg };
           },
           getPackageSignals: (ctx, domain) => {
               const state = window.AbluteSDK.resolvePackageState(ctx, domain);
               return state.status === 'allowed' ? state.pkg.signals : null;
           },
           getPackageFacts: (ctx, domain) => {
               const state = window.AbluteSDK.resolvePackageState(ctx, domain);
               return state.status === 'allowed' ? state.pkg.facts : [];
           }
        };

        window.addEventListener('ablute:ready', (e) => {
            console.log('[SleepApp] Shell is ready. Consuming domainPackages via SDK...');
            renderApp();
        });

        function renderApp() {
            const context = window.ablute;
            const sdk = window.AbluteSDK;
            const statusEl = document.getElementById('status-container');
            const panelEl = document.getElementById('data-panel');

            // 1. Resolver o estado de forma governada via SDK (Sem parsing manual frágil)
            const { status, pkg } = sdk.resolvePackageState(context, 'sleep');

            if (status === 'missing') {
                statusEl.innerHTML = '<span class="status-badge denied">ERRO: SEM ACESSO</span>';
                panelEl.innerHTML = 'Este domínio não existe na bridge local.';
                return;
            }

            // 2. Telemetria de consumo obrigatória
            window.ablute.emit('package_read', { domain: 'sleep', version: pkg.packageVersion });

            // 3. Renderização formal baseada nos 3 estados Standard
            if (status === 'allowed') {
                const signals = sdk.getPackageSignals(context, 'sleep');
                const facts = sdk.getPackageFacts(context, 'sleep');
                
                statusEl.innerHTML = '<span class="status-badge allowed">ACCESSO PERMITIDO (v1.3)</span>';
                const score = signals?.score || '--';
                const label = signals?.statusLabel || 'Sem dados';
                panelEl.innerHTML = `
                    <div style="font-size: 24px; color: #00F2FF; font-weight: bold;">${score}%</div>
                    <div>${label}</div>
                    <div style="margin-top: 12px; font-size: 12px; color: #aaa;">
                        Factos ativos: ${facts.length}
                    </div>
                `;
            } else if (status === 'denied') {
                statusEl.innerHTML = '<span class="status-badge denied">NEGADO</span>';
                panelEl.innerHTML = 'Não tem permissões para ler dados de sono.';
            } else if (status === 'unavailable') {
                statusEl.innerHTML = '<span class="status-badge unavailable">SEM DADOS</span>';
                panelEl.innerHTML = 'Nenhum exame de sono encontrado no sistema.';
            }

            // Anti-regression: legacy context is no longer read or permitted here.
        }

        // Simulação para quando rodamos fora da Shell
        if (window.ablute) {
          renderApp();
        }
    </script>
</body>
</html>
